name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: master

      - name: Build all utilities
        run: zig build -Doptimize=ReleaseSafe

      - name: Package executables
        run: |
          mkdir -p dist
          cp zig-out/bin/*.exe dist/
          cd dist
          zip -r ../coreutils4win-${{ github.ref_name }}.zip .

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: CoreUtils4Win ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: coreutils4win-${{ github.ref_name }}.zip
